name: hentai-downloader
version: "0.2"
author: Hongsheng Zheng <mathan0203@gmail.com>
about: Download the Manga from e(x)hentai website.

args:
  - cookie:
      short: c
      long: cookie
      value_name: file
      help: The cookie file for access exhentai.org

  - url:
      short: u
      long: url
      value_name: url
      required: true
      help: The url of Manga for which you want to download

  - retry:
      short: r
      long: retry
      takes_value: false
      help: 强制重试，直到所有下载成功

  # ✅ 新增 proxy-mode
  - proxy-mode:
      long: proxy-mode
      value_name: none|http|socks
      possible_values:
        - none
        - http
        - socks
      default_value: none
      help: |
        选择不同的代理模式，会自动从环境变量中读取相对应的代理服务地址进行配置
        支持的环境变量名称：http_proxy，https_proxy，all_proxy 且支持它们的大写方式
        none：使用默认方式，不配置代理服务
        http：同时配置Proxy.http，Proxy.https代理服务。会自动读取环境变量(http_proxy|https_proxy)的代理服务地址，变量值不存在就会自动切换到none模式
        socks：配置Proxy.all代理服务，会自动读取环境变量(all_proxy)的代理服务地址，变量值不存在就会自动切换到none模式

  # ✅ 新增 proxy
  - proxy:
      long: proxy
      value_name: url
      help: |
        自定义代理服务地址，优先级高于proxy-mode参数
        只支持：http, https, socks5, socks5h

  - convert-socks5h:
      long: convert-socks5h
      takes_value: false
      help: 将socks5协议的代理地址转换成socks5h协议